name: ${COMPOSE_PROJECT_NAME:-psilink-sftp}

services:
  sftp:
    # Pinned to a specific multi-arch index digest (not the mutable :latest) so
    # local and CI runs use a byte-identical, reproducible image; bump the
    # digest deliberately when updating the SFTP test image. No build fallback:
    # building the unpinned upstream HEAD would defeat the pin.
    image: atmoz/sftp@sha256:0960390462a4441dbb63698d7c185b76a41ffcee7b78ff4adf275f3e66f9c475
    pull_policy: missing
    ports:
      - "${SFTP_PORT:-2222}:22"
    volumes:
      - ${PWD}/apps/cli/test/container/sftp/users.conf:/etc/sftp/users.conf:ro
      - ${PWD}/apps/cli/test/container/sftp/ssh_host_ed25519_key:/etc/ssh/ssh_host_ed25519_key:ro
      - ${PWD}/apps/cli/test/container/sftp/ssh_host_rsa_key:/etc/ssh/ssh_host_rsa_key:ro
      - ${PWD}/apps/cli/test/container/sftp/srv:/home/usera/psi
      - ${PWD}/apps/cli/test/container/sftp/srv:/home/userb/psi
    networks:
      - sftp

networks:
  sftp:
