# HTTPS server

# Elastic Beanstalk includes conf.d/*.conf inside its http{} block, so the
# http-context directives below -- the shared-memory zones and the optional
# real_ip recovery -- are valid here even though they sit outside server{}.
#
# Per-client-address shared-memory zones for the signaling upgrade limits applied
# in the `location /api/peerjs` block below. The rate and connection numbers are
# illustrative starting points to tune to your load, not recommended values.
limit_req_zone  $binary_remote_addr  zone=psilink_sig_req:10m   rate=10r/s;
limit_conn_zone $binary_remote_addr  zone=psilink_sig_conn:10m;

# The zones key on $binary_remote_addr, the address nginx sees directly. On a
# single-instance environment that is the client. On a load-balanced environment
# nginx sits behind the AWS load balancer and sees its address instead, so the
# per-address limits collapse onto one bucket; recover the real client address
# from the balancer's X-Forwarded-For by uncommenting the block below. Set the
# trusted source to the LOAD BALANCER's subnet(s) only -- NOT the whole VPC:
# trusting a wider range lets any host in it that can reach nginx directly forge
# X-Forwarded-For to evade or misattribute the limits, so also keep nginx
# unreachable except through the load balancer.
# real_ip_header    X-Forwarded-For;
# set_real_ip_from  10.0.0.0/24;       # the load balancer's subnet(s) only, not the whole VPC
# real_ip_recursive on;

# Optional Origin allowlist for the signaling upgrade (a browser always sends
# Origin on a WS upgrade). Disabled by default because the reference cannot know
# your public origin: the map defaults to deny, so an active allowlist would 403
# every client until edited. To enforce it, uncomment this map and set your
# origin(s), then uncomment the matching `if` in `location /api/peerjs` below.
# map $http_origin $psilink_origin_ok {
#     default                        0;
#     "https://psilink.example.org"  1;   # replace with your public origin(s)
# }

# The PeerJS upgrade URL carries per-exchange identifiers (the derived rendezvous
# id and the connection token) as query arguments, which the app keeps out of its
# own logs. The signaling location below logs with this format -- the request path
# only ($uri), never the query string ($request/$request_uri) -- so the access log
# does not record them either.
log_format  psilink_sig_noquery
    '$remote_addr - $remote_user [$time_local] "$request_method $uri $server_protocol" '
    '$status $body_bytes_sent "$http_user_agent" "$http_x_forwarded_for"';

server {
    listen       443 ssl;
    access_log  /var/log/nginx/access.log  main;
    server_name  localhost;
    
    ssl_certificate      /etc/pki/tls/certs/server.crt;
    ssl_certificate_key  /etc/pki/tls/certs/server.key;
    
    ssl_session_timeout  5m;
    # Session resumption disabled, active by default: every TLS session is a full
    # ECDHE handshake. Two directives, because two mechanisms.
    #
    # ssl_session_tickets off is the forward-secrecy fix. nginx enables stateless TLS
    # session tickets by default; with no ssl_session_ticket_key each worker derives one
    # ticket key at startup and never rotates it. That key is the long-term secret that
    # wraps every resumed session's keying material, so a passive observer who captures
    # resumed traffic and later obtains the key (memory disclosure, host compromise, a
    # stale key surviving a config copy) can decrypt those sessions -- defeating the
    # per-session forward secrecy the ECDHE-only ssl_ciphers below give full handshakes.
    #
    # ssl_session_cache off pins that guarantee rather than resting it on a default.
    # Tickets-off alone is incomplete: under TLS 1.3 it only switches stateless tickets
    # to stateful ones, which resume against a server-side cache, so "full handshake
    # every time" holds today only because no cache is configured (the default is none).
    # Setting it off makes that explicit -- a later ssl_session_cache (operator- or
    # platform-added) cannot silently restore TLS 1.3 resumption -- and also drops the
    # TLS 1.2 session-id path. This pins the posture; it is not the forward-secrecy
    # finding (the cache is short-lived memory, not the unrotated long-term ticket key).
    #
    # The cost is the resumption round-trip saving, negligible on this low-volume
    # coordination surface; the gain is no unrotated key, no rotation tooling, and no
    # load-balanced cross-instance key problem (each instance otherwise derives its own
    # unshared key, so cross-instance resumption needs a shared ssl_session_ticket_key
    # rotated in lockstep). To trade it back, deliberately re-enable both: tickets with
    # rotated, cross-instance-shared ssl_session_ticket_key file(s) and an ssl_session_cache;
    # ssl_session_timeout above then bounds how long a session resumes. Note the key file
    # is itself the long-term secret this removed, now persisted on disk -- keep it
    # owner-only (0400), distribute it only over a secured channel, and rotate it, or an
    # on-disk key reintroduces the exposure rather than removing it.
    ssl_session_tickets  off;
    ssl_session_cache    off;

    ssl_protocols  TLSv1.2 TLSv1.3;
    # Explicit forward-secrecy / AEAD-only suite list, active by default. Without it
    # nginx falls back to the OpenSSL/platform default, which under TLS 1.2 still
    # permits CBC-mode SHA1 and non-forward-secret plain-RSA key-exchange suites, and
    # leaves the `ssl_prefer_server_ciphers on` below with no ordered list to prefer.
    # This list keeps only ECDHE (forward secrecy) AEAD suites (AES-GCM,
    # ChaCha20-Poly1305) and constrains the TLS 1.2 handshake only -- TLS 1.3 suite
    # selection is governed by the TLS 1.3 defaults, not ssl_ciphers. Both the ECDSA
    # and RSA variants are listed so the list is correct for either certificate type;
    # the unmatched ones are simply never selected.
    ssl_ciphers  ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers   on;

    # Explicit ECDHE curve list, active by default. Without it ssl_ecdh_curve is `auto`,
    # leaving curve selection to the OpenSSL/platform default. Modern OpenSSL already
    # prefers X25519 and P-256, so the practical security delta is small; pinning the
    # list makes the choice explicit and resilient to a future platform-default change,
    # at no operator-editing cost -- the same active-if-safe-unedited posture as the
    # ssl_ciphers list above. Unlike ssl_ciphers, which constrains the TLS 1.2 handshake
    # only, this constrains the named groups for BOTH the TLS 1.2 ECDHE key agreement and
    # the TLS 1.3 key-share, so it is kept to two groups -- X25519 and P-256 -- that
    # effectively every TLS 1.2+ AEAD client able to negotiate the ssl_ciphers above
    # already offers. This became marginally more
    # load-bearing once ssl_session_tickets/ssl_session_cache off above disabled
    # resumption: every connection is now a full ECDHE handshake, so the curve is
    # exercised on every connection rather than amortized across resumed sessions.
    ssl_ecdh_curve  X25519:prime256v1;

    # HSTS (Strict-Transport-Security): OPT-IN template, left commented. Uncomment to
    # tell browsers to refuse plain-HTTP and bad-certificate access to this host for
    # max-age seconds. Do NOT enable it while serving a test or self-signed
    # certificate: HSTS pins HTTPS, so a pinned host cannot be reached over plain HTTP
    # to recover and a bad cert can no longer be click-through-accepted -- the browser
    # is locked out until max-age expires. Enable it only with a valid certificate
    # chain, starting from a short max-age to verify, then raising it (a common
    # production value is 31536000, one year). `includeSubDomains` extends the pin to
    # every subdomain; add it only if all of them serve valid HTTPS. `preload` is a
    # one-way, hard-to-undo commitment to the browser preload list
    # (https://hstspreload.org) -- leave it off unless you have deliberately decided
    # to submit this host. The header is honored only on an HTTPS response and takes
    # effect on first contact only if plain HTTP is already redirected to HTTPS; on
    # Elastic Beanstalk do that redirect at the load balancer (an ALB HTTP listener
    # that 301s to HTTPS) rather than adding a :80 server here, which would collide
    # with the platform's own. nginx applies add_header all-or-nothing per location:
    # this server-level header reaches every location only while none declares its
    # own add_header, so if you later add a header inside a location block (e.g.
    # /api/peerjs) re-declare this one there too or it drops there.
    # add_header Strict-Transport-Security "max-age=300" always;   # raise max-age (e.g. 31536000), add `; includeSubDomains` / `; preload`, deliberately

    # OCSP stapling: OPT-IN template, left commented. When enabled nginx fetches a fresh
    # OCSP response for its own certificate and staples it into the handshake, so the
    # client need not contact the CA's OCSP responder itself -- a privacy and latency win,
    # and fresher status for clients that already check revocation. It does not by itself
    # make a client ENFORCE revocation (a soft-fail client stays soft-fail; hard-fail needs
    # OCSP Must-Staple on the certificate, out of scope here). It ships inert, not active,
    # for the same reason as the HSTS template above: the reference is commonly run with a
    # test or self-signed certificate, which has no CA-published OCSP responder to staple,
    # so stapling cannot work there -- and it additionally needs infrastructure this config
    # cannot assume. To enable it, uncomment ALL of the directives below together:
    #   - `resolver` so nginx can resolve the OCSP responder's hostname (use a resolver you
    #     control, NOT a public one -- a public DNS provider would learn which CA/responder
    #     your certificate uses; on Elastic Beanstalk the AWS VPC resolver below is natural);
    #   - `ssl_stapling on` / `ssl_stapling_verify on` to staple and to verify the response;
    #   - `ssl_trusted_certificate` pointing at the full issuer chain (intermediate + root),
    #     which ssl_stapling_verify uses to validate the stapled response.
    # The certificate served by ssl_certificate above must itself carry a CA-published OCSP
    # responder URL (rules out the default self-signed cert). Stapling is best-effort: on a
    # misconfiguration nginx logs a warning and serves an UNSTAPLED handshake rather than
    # failing it, so a half-edit degrades quietly rather than loudly -- after enabling,
    # confirm it actually staples with `openssl s_client -status -connect host:443` (look
    # for "OCSP Response Status: successful") rather than assuming it took. That check
    # confirms a staple is PRESENT, not that it was VERIFIED -- it shows a response whether
    # or not ssl_stapling_verify is on -- so also confirm ssl_stapling_verify and
    # ssl_trusted_certificate are both set; a green status with verify off is unverified.
    # resolver                 169.254.169.253 valid=300s;   # AWS VPC resolver (link-local); one you control, not a public DNS provider
    # resolver_timeout         5s;
    # ssl_stapling             on;
    # ssl_stapling_verify      on;
    # ssl_trusted_certificate  /etc/pki/tls/certs/chain.pem;   # issuer chain: intermediate + root

    client_header_timeout 60;
    client_body_timeout   60;
    keepalive_timeout     60;
    gzip                  off;
    gzip_comp_level       4;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;

    # Signaling upgrade surface: per-address rate/connection limits (and the
    # optional Origin allowlist above) scoped to the PeerJS coordination path,
    # not the whole server. See docs/DEPLOYMENT.md ("Hardening the signaling
    # surface"). The `^~` prefix match beats the EB-generated catch-all
    # `location /` for /api/peerjs requests AND stops a later regex location from
    # taking precedence and silently dropping these limits; everything else still
    # falls through to the included EB locations.
    location ^~ /api/peerjs {
        # Enforce Origin. Requires the `map` above uncommented too: with the map
        # commented, $psilink_origin_ok is undeclared, which nginx rejects at load
        # as an "unknown variable" -- it is not substituted with an empty string,
        # so a half-edit fails to start loudly rather than silently passing Origin.
        # if ($psilink_origin_ok = 0) { return 403; }

        # Path-only access log (see psilink_sig_noquery above): keep the rendezvous
        # id and token in the upgrade query string out of /var/log/nginx/access.log.
        access_log  /var/log/nginx/access.log  psilink_sig_noquery;

        limit_req   zone=psilink_sig_req burst=20 nodelay;   # new-connection rate per address
        limit_conn  psilink_sig_conn 32;                     # concurrent connections per address
        limit_req_status  429;   # rate-limited is 429 Too Many Requests, not the default 503
        limit_conn_status 429;

        proxy_pass          http://127.0.0.1:8080;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade            $http_upgrade;
        proxy_set_header    Connection         "upgrade";
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
    }

     # Include the Elastic Beanstalk generated locations
    include conf.d/elasticbeanstalk/*.conf;
}
