name: CLI Build and Test

# Pull-request gate for the CLI (apps/cli), kept separate from
# eb_build_and_test.yaml -- which builds and tests only the web app for its
# Elastic Beanstalk deploy. This is the merge-time gate that catches a
# dependency bump breaking the ssh2 SFTPWrapper coupling the SFTP adapter
# relies on (see docs/SECURITY_DESIGN.md, "Upgrading the SFTP stack"); the same
# integration suite also runs in release.yaml as the ship gate before publish.
#
# Scoped by path to CLI-affecting changes. If this job is made a required
# status check, configure branch protection so a path-skipped run does not
# block an unrelated PR -- a skipped required check otherwise stays pending.

on:
  pull_request:
    branches: [main, staging]
    paths:
      - "apps/cli/**"
      - "packages/core/**"
      - "lib/**"
      - "package-lock.json"
      - "tsconfig.base.json"
      - ".github/actions/setup/**"
      - ".github/workflows/cli_build_and_test.yaml"

# Cancel a superseded run when a newer commit lands on the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# Least privilege: this build/test gate only needs to read the repo.
permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Pins Node, installs from the lockfile, and builds @psilink/core.
      - uses: ./.github/actions/setup
      - name: Build CLI
        run: npm run build -w apps/cli
      - name: Unit tests (CLI)
        run: npm run test:unit -w apps/cli
      # Integration tests exercise the real ssh2 SFTPWrapper contract end to end
      # (unit tests run against mocks), so they are what actually catches a
      # dependency bump that breaks the coupling. The suite is self-managing: a
      # vitest globalSetup starts the SFTP test server before the suite and stops
      # it after, so no extra setup step is needed.
      - name: Integration tests (CLI, in-process server)
        run: npm run test:integration -w apps/cli
      # A second leg runs the same suite against a native OpenSSH sshd, so the
      # adapter is also exercised against a real server. sshd ships on the Ubuntu
      # runner, but its build fatally checks for the privilege-separation
      # directory at startup even when run unprivileged, so create it here.
      - name: Integration tests (CLI, native sshd server)
        run: |
          sudo mkdir -p /run/sshd
          npm run test:integration -w apps/cli
        env:
          PSILINK_SFTP_BACKEND: native

  # Phase 3 hardened native-sshd profiles. The same conformance suite runs against
  # the native backend under each hardened configuration real deployments use
  # (restricted kex/cipher policy, connection/auth rate limits, an explicit user
  # allowlist), proving the pure-JS ssh2 adapter still negotiates and runs under
  # them. Additive and parallel: the in-process and baseline native legs in the
  # `test` job above are unchanged. Integration tests import the adapter from src
  # (vitest transpiles) and consume @psilink/core from the setup action's build,
  # so no CLI build step is needed. If the added CI minutes prove too costly, trim
  # this matrix per board-10 item 199637670.
  hardened-native:
    name: Hardened native sshd (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [restricted-crypto, rate-limited, allowlist]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Integration tests (CLI, native sshd, ${{ matrix.profile }} profile)
        run: |
          sudo mkdir -p /run/sshd
          npm run test:integration -w apps/cli
        env:
          PSILINK_SFTP_BACKEND: native
          PSILINK_SFTP_NATIVE_PROFILE: ${{ matrix.profile }}

  # The chroot profile confines the SFTP session with ChrootDirectory, which needs
  # sshd to run as root over a root-owned jail. The Ubuntu runner has passwordless
  # sudo, so this leg runs the suite as root; the runner (test/sftpServer/
  # runChrootProfile.mjs) would skip cleanly with exit 0 where root is
  # unavailable. PATH is forwarded through sudo so npm and node resolve as root.
  chroot-native:
    name: Hardened native sshd (chroot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Integration tests (CLI, native sshd, chroot profile)
        run: |
          sudo mkdir -p /run/sshd
          sudo --preserve-env=PATH env "PATH=$PATH" npm run test:integration:native-chroot -w apps/cli
