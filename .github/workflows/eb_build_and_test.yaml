name: Build and Test for Elastic Beanstalk

# Yoinked from here:
# https://blog.danskingdom.com/Multiple-ways-to-setup-your-CI-CD-pipelines-in-GitHub-Actions/#approach-5-deploy-workflow-includes-build-workflow-and-uses-template-for-deployments-include-approach-with-reusable-workflows

on:
  # PR validation only, scoped by path to web/core-affecting changes. Deploys
  # build through eb_deploy.yaml's workflow_call, so there is no standalone push
  # trigger here -- it would double-run with the pull_request event on a feature
  # branch that already has an open PR. If this job becomes a required status
  # check, configure branch protection so a path-skipped run does not block an
  # unrelated PR -- a skipped required check otherwise stays pending.
  #
  # Note: this PR filter deliberately diverges from the push filter in
  # eb_deploy.yaml on test sources -- it uses the broad apps/web/** and
  # packages/core/** globs so a test-only PR (deleting or weakening assertions,
  # or changing vitest config) still runs the full suite, including the core
  # tests this gate runs via `npm run -w packages/core test`. The deploy filter
  # stays scoped to deploy-affecting sources only and omits the test/** trees.
  # The two filters cannot share a single list because of this intentional
  # difference. packages/core/** matches the sibling cli_build_and_test.yaml.
  pull_request:
    branches: [main, staging]
    paths:
      - "lib/**"
      - "package-lock.json"
      - "tsconfig.base.json"
      - "apps/web/**"
      - "packages/core/**"
      - ".github/actions/setup/**"
      - ".github/workflows/eb_build_and_test.yaml"

  workflow_call:
    outputs:
      artifactName:
        description: "Name of the uploaded artifact"
        value: ${{jobs.build-and-test.outputs.artifactName}}

# Cancel a superseded PR run when a newer commit lands on the same PR/branch.
# NOT keyed on github.workflow: in a workflow_call invocation the github context
# is the caller's, so github.workflow resolves to eb_deploy.yaml's name and this
# block would share eb_deploy.yaml's concurrency group, self-cancelling the
# deploy on a single push (a GitHub Actions reusable-workflow footgun). A literal
# prefix keeps this group independent of any caller. The || github.run_id
# fallback gives the deploy leg's reused build a unique group (head_ref is empty
# off pull_request), so cancel-in-progress is inert there and never cancels a
# deploy; on a PR, head_ref groups the PR's runs so a newer commit supersedes.
concurrency:
  group: eb-build-and-test-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# Least privilege: this build/test gate only needs to read the repo.
permissions:
  contents: read

env:
  ARTIFACT_NAME: ${{format('{0}-{1}', vars.EB_APPLICATION_NAME, github.sha)}}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    outputs:
      artifactName: ${{steps.artifact-name.outputs.artifactName}}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
      # Pins Node, installs from the lockfile, and builds @psilink/core.
      - name: Set up and build core
        uses: ./.github/actions/setup
      - name: Build server
        run: npm run -w apps/web build
      - name: Run tests
        run: |
          npm run -w packages/core test
      # Web unit tests run in the node environment against the already-built
      # @psilink/core -- no dev server or Docker (the integration and browser
      # projects are the ones that stand up a server), so the shared setup above
      # is all they need. Kept a discrete step from the core "Run tests" above so
      # a web-unit regression gives a clear failure signal of its own.
      - name: Web unit tests
        run: npm run test:unit -w apps/web
      # The browser project (below) drives real Chromium; the stock ubuntu-latest
      # runner ships none, so provision it and the apt libraries it links against
      # here, before that project runs. --with-deps installs those apt libraries;
      # on Node 26 this needs playwright >= 1.60 (earlier versions hang extracting
      # the browser archive, microsoft/playwright#40724) -- the lockfile pins
      # >= 1.61, so do not downgrade. (The dev container provisions Chromium
      # separately and is maintained independently.)
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      # Integration and browser tests both stand up the web dev server through a
      # shared, self-managing vitest globalSetup (it spawns the server, waits for
      # readiness, reuses a running one, and tears it down -- no manual step and no
      # Docker; integration hits the HTTP/SSE routes in node, browser drives
      # Chromium). Running both projects in ONE vitest process lets that setup
      # start the server once and the second project reuse it, rather than two
      # invocations each paying a full cold start -- so keep them combined via the
      # dedicated test:integration:browser script (which names both projects
      # explicitly). Splitting back into separate test:integration + test:browser
      # steps reintroduces the second cold start. vitest still reports per
      # project/file, so a failure names the suite that broke.
      #
      # The integration project gates the web deploy on the app's own behavior
      # (independent of the CLI, whose tests live in release.yaml); the browser
      # project covers the security-relevant accept-screen controls (the consent
      # gate over the PII exchange and the decode-error escaping) plus the live PSI
      # exchange and cross-implementation vectors -- behavior no other CI job
      # covers, since it needs a DOM the node projects lack, so a browser-only
      # regression would otherwise ship unnoticed. Both run on the PR gate and this
      # workflow's push/deploy path, so the deploy artifact is gated on them too.
      - name: Web integration and browser tests
        run: npm run test:integration:browser -w apps/web
      - name: Package for Elastic Beanstalk
        run: |
          cp -a apps/web/deploy/aws_eb/. apps/web/.output
          touch apps/web/.output/.env
          (cd apps/web/.output && zip -r ../../../${{github.sha}}.zip .)
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{env.ARTIFACT_NAME}}
          path: ${{github.sha}}.zip
          compression-level: 0
      - name: Output artifact name
        id: artifact-name
        run: echo "artifactName=${{env.ARTIFACT_NAME}}" >> "$GITHUB_OUTPUT"
