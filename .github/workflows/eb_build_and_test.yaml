name: Build and Test for Elastic Beanstalk

# Yoinked from here:
# https://blog.danskingdom.com/Multiple-ways-to-setup-your-CI-CD-pipelines-in-GitHub-Actions/#approach-5-deploy-workflow-includes-build-workflow-and-uses-template-for-deployments-include-approach-with-reusable-workflows

on:
  # PR validation only. Deploys build through eb_deploy.yaml's workflow_call, so
  # there is no standalone push trigger here: one would double-run on a feature
  # branch that already has an open PR (push event + PR synchronize), and on dev,
  # which eb_deploy also builds.
  pull_request:
    branches: [main, staging]

  workflow_call:
    outputs:
      artifactName:
        description: "Name of the uploaded artifact"
        value: ${{jobs.build-and-test.outputs.artifactName}}

env:
  ARTIFACT_NAME: ${{format('{0}-{1}', vars.EB_APPLICATION_NAME, github.sha)}}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    outputs:
      artifactName: ${{steps.artifact-name.outputs.artifactName}}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
      - name: Setup NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Build server
        run: npm run -w packages/core -w apps/web build
      - name: Run tests
        run: |
          npm run -w packages/core test
      # Web integration tests gate the web deploy on the app's own behavior,
      # independent of the CLI (whose tests live in release.yaml). The suite is
      # self-managing -- a vitest globalSetup spawns the dev server, waits for
      # readiness, and tears it down -- and needs no Docker (it runs in the node
      # environment and hits the HTTP/SSE routes), so a stock runner suffices.
      - name: Web integration tests
        run: npm run test:integration -w apps/web
      - name: Package for Elastic Beanstalk
        run: |
          cp -a apps/web/deploy/aws_eb/. apps/web/.output
          touch apps/web/.output/.env
          (cd apps/web/.output && zip -r ../../../${{github.sha}}.zip .)
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{env.ARTIFACT_NAME}}
          path: ${{github.sha}}.zip
          compression-level: 0
      - name: Output artifact name
        id: artifact-name
        run: echo "artifactName=${{env.ARTIFACT_NAME}}" >> $GITHUB_OUTPUT
