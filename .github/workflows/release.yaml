name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build -w packages/core -w apps/cli
      - name: Unit tests (core)
        run: npm test -w packages/core
      - name: Unit tests (CLI)
        run: npm run test:unit -w apps/cli

      # Integration tests are not yet wired into CI — they require Docker Compose
      # and need validation in the GitHub Actions environment before being made a
      # release gate. The container is now self-managing (a vitest globalSetup
      # brings it up and tears it down, generating host keys on first run), so
      # enabling them on a Docker-capable runner is a single step:
      #
      #   - name: Integration tests (CLI)
      #     run: npm run test:integration -w apps/cli

  publish:
    name: Publish Docker image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: vdorie/psi-link
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.0

      - name: Sign image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY \
            vdorie/psi-link@${{ steps.build.outputs.digest }}
