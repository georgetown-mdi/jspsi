name: Static Checks

# Repo-wide typecheck, lint, and format gate for every pull request. Kept
# separate from the build/test workflows (cli_build_and_test.yaml,
# eb_build_and_test.yaml), which are path-scoped to one app and run the heavier
# unit/integration suites. These checks span the whole monorepo -- a type error
# in a test file, an eslint violation, or prettier drift can land in any
# workspace -- so this workflow is intentionally NOT path-filtered.
#
# `npm run typecheck` runs each workspace's noEmit tsconfig, including the
# tsconfig.test.json files that cover test sources (the build/composite configs
# exclude test/ so test code never reaches the emitted dist). It resolves
# @psilink/core from the built package, so packages/core is built first.

on:
  pull_request:
    branches: [main, staging]

# Cancel a superseded run when a newer commit lands on the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# Least privilege: these checks only need to read the repo.
permissions:
  contents: read

jobs:
  static-checks:
    name: Typecheck, Lint, Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Pins Node, installs from the lockfile, and builds @psilink/core (built
      # first so the CLI and web typechecks resolve its declarations from dist,
      # the same way the apps consume it).
      - uses: ./.github/actions/setup
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run formatcheck
