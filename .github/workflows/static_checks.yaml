name: Static Checks

# Repo-wide typecheck, lint, and format gate for every pull request. Kept
# separate from the build/test workflows (cli_build_and_test.yaml,
# eb_build_and_test.yaml), which are path-scoped to one app and run the heavier
# unit/integration suites. These checks span the whole monorepo -- a type error
# in a test file, an eslint violation, or prettier drift can land in any
# workspace -- so this workflow is intentionally NOT path-filtered.
#
# `npm run typecheck` runs each workspace's noEmit tsconfig, including the
# tsconfig.test.json files that cover test sources (the build/composite configs
# exclude test/ so test code never reaches the emitted dist). It resolves
# @psilink/core from the built package, so packages/core is built first.

on:
  pull_request:
    branches: [main, staging]

# Cancel a superseded run when a newer commit lands on the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# Least privilege: these checks only need to read the repo.
permissions:
  contents: read

jobs:
  static-checks:
    name: Typecheck, Lint, Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Pins Node, installs from the lockfile, and builds @psilink/core (built
      # first so the CLI and web typechecks resolve its declarations from dist,
      # the same way the apps consume it).
      - uses: ./.github/actions/setup
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run formatcheck
      # Resolves every Markdown link/anchor across the repo (docs/ overview,
      # docs/spec/ technical, and the root governance files), failing on a dead
      # path or dead heading anchor. This is the forcing function that keeps the
      # two-tier docs from drifting into stale cross-references on a move or
      # rename. Needs only Node and git ls-files, so it does not depend on the
      # @psilink/core build above.
      - name: Doc links
        run: npm run linkcheck
      # Backstops CONTRIBUTING.md as a quickstart: fails if it grows a section
      # outside its heading allowlist or cites a `node_modules/` source path --
      # the two mechanical tells that reference-depth detail (which belongs in
      # docs/spec/DEPENDENCY_PINS.md or docs/TESTING.md) crept back in.
      - name: CONTRIBUTING scope
        run: npm run check:contributing
      # Scripts project (.claude/scripts/*.mjs) has its own vitest suite. Plain
      # .mjs with no server or Docker dependency, so a stock runner suffices. This
      # is the repo-wide non-path-filtered gate that guarantees the suite is always
      # guarded -- no workflow invoked it before this step was added.
      - name: Scripts tests
        run: npm run test:scripts
