name: Deploy to Elastic Beanstalk

on:
  # No dev entry: there is no Elastic Beanstalk environment for dev yet, so a
  # dev push must not trigger a deploy.
  push:
    branches: [main, staging]
    # Scoped to deploy-affecting sources only: apps/web/test/** is intentionally
    # excluded so a test-only push to staging/main does not trigger a rebuild and
    # redeploy of unchanged behavior. The PR gate (eb_build_and_test.yaml) uses
    # apps/web/** instead to catch test-only PRs; the two filters diverge on
    # test/** by design -- see the comment in eb_build_and_test.yaml.
    paths:
      - "lib/**"
      - "package-lock.json"
      - "tsconfig.base.json"
      - "apps/web/deploy/aws_eb/**"
      - "apps/web/public/**"
      - "apps/web/server/**"
      - "apps/web/src/**"
      - "apps/web/nitro.config.ts"
      - "apps/web/package.json"
      - "apps/web/postcss.config.cjs"
      - "apps/web/tsconfig.json"
      - "apps/web/vite.config.ts"
      - "packages/core/src/**"
      - "packages/core/package.json"
      - "packages/core/rollup.config.ts"
      - "packages/core/tsconfig.json"
      - ".github/actions/setup/**"

  workflow_dispatch:

concurrency:
  # Serialize deploys to the same Elastic Beanstalk environment: two pushes to
  # the same branch must never race `update-environment` against one environment.
  # github.ref keys the group so it lines up with the branch -> environment
  # mapping in eb_deploy_reusable_action.yaml (main -> Production, staging ->
  # Staging); different environments still deploy in parallel. cancel-in-progress
  # is false -- unlike the PR test gates, cancelling a deploy mid-update can leave
  # the environment inconsistent, so an in-flight run finishes before the next
  # one starts rather than being superseded.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-test:
    uses: ./.github/workflows/eb_build_and_test.yaml

  deploy:
    needs: build-and-test
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/eb_deploy_reusable_action.yaml
    with:
      artifactName: ${{needs.build-and-test.outputs.artifactName}}
      branchName: ${{github.ref_name}}
    secrets: inherit
