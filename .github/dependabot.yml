version: 2
updates:
  # Workspace root and all npm packages
  - package-ecosystem: npm
    directory: "/"
    target-branch: "staging"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    # Supply-chain hardening: never adopt a freshly published release. The
    # cooldown holds a new version until the ecosystem has had time to surface a
    # compromised release (hijacked maintainer token, malicious postinstall)
    # before we ingest it, trading a few days of patch latency for not being the
    # first to pull. It delays routine version bumps only.
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 5
    groups:
      # Cryptographic dependencies are grouped separately so they are reviewed
      # together and subject to the security review requirement in CONTRIBUTING.md.
      cryptographic:
        patterns:
          - "@openmined/psi.js"
          - "@noble/curves"
          - "node-forge"
          - "ssh2"
          - "ssh2-sftp-client"
      # The WebRTC stack is grouped (not batched into non-critical) because the
      # web inbound bound drives peerjs internals and parses the peerjs-js-binarypack
      # wire format past their public APIs, so every bump must re-verify that coupling
      # before it merges -- see the "Upgrading the PeerJS stack" checklist in
      # CONTRIBUTING.md, mirroring the SFTP stack's exact-pin + review treatment.
      webrtc-stack:
        patterns:
          - "peerjs"
          - "peerjs-js-binarypack"
      # Batch routine dependency bumps to reduce noise.
      non-critical:
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "@openmined/psi.js"
          - "@noble/curves"
          - "node-forge"
          - "ssh2"
          - "ssh2-sftp-client"
          - "peerjs"
          - "peerjs-js-binarypack"
          # Exact-pinned, matching-critical: both parties' runtime behavior for
          # these must stay byte-identical or PSI key derivation silently
          # diverges. Excluded so each bump is an individual, reviewable PR
          # instead of riding along in this batch -- see "Why these are
          # exact-pinned" in docs/spec/DEPENDENCY_PINS.md.
          - "re2js"
          - "yaml"
          - "canonicalize"
    ignore:
      # The OpenMined PSI module is vendored; updates require manual review
      # of the tarball and NOTICE file before the lock file is updated.
      - dependency-name: "@openmined/psi.js"
        update-types:
          [
            "version-update:semver-major",
            "version-update:semver-minor",
            "version-update:semver-patch",
          ]

  # CLI Dockerfile base image
  - package-ecosystem: docker
    directory: "/"
    target-branch: "staging"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    cooldown:
      # Only default-days is valid for the docker and github-actions
      # ecosystems; the semver-*-days keys are supported for npm only.
      default-days: 7

  # GitHub Actions used by the workflows in .github/workflows. Every action is
  # tag-pinned (e.g. actions/checkout@v7), so this tracks those tags for new
  # releases and security advisories.
  - package-ecosystem: github-actions
    directory: "/"
    target-branch: "staging"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    cooldown:
      # Only default-days is valid for the docker and github-actions
      # ecosystems; the semver-*-days keys are supported for npm only.
      default-days: 7
    ignore:
      # Every action from these orgs is pinned to a floating major tag (e.g.
      # actions/checkout@v7), which already tracks the latest release within that
      # major at runtime. A minor/patch bump PR would only re-pin us to a
      # specific, frozen version (dropping later fixes) and add churn -- so we
      # ignore within-major bumps and let the major tags float. Major bumps
      # (e.g. checkout v6 -> v7) are NOT ignored and still surface for review.
      #
      # sigstore/cosign-installer is intentionally NOT listed: it publishes no
      # floating major tag, so it stays exact-pinned (@v4.1.2) and its patch
      # bumps are legitimate, reviewable updates to the release-signing tool.
      #
      # A new floating-major action from another org should be added here.
      - dependency-name: "actions/*"
        update-types:
          ["version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "docker/*"
        update-types:
          ["version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "aws-actions/*"
        update-types:
          ["version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "github/*"
        update-types:
          ["version-update:semver-minor", "version-update:semver-patch"]
